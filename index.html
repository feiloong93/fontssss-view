<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fontssss View — Local Font Preview</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cellipse cx='50' cy='50' rx='40' ry='28' fill='none' stroke='%231a1a1a' stroke-width='10'/%3E%3Ccircle cx='50' cy='50' r='14' fill='none' stroke='%231a1a1a' stroke-width='8'/%3E%3Ccircle cx='50' cy='50' r='4' fill='%231a1a1a'/%3E%3C/svg%3E">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f5f5f0;
      --card-bg: #ffffff;
      --text: #1a1a1a;
      --text-secondary: #888;
      --accent: #ff3366;
      --border: #e5e5e0;
      --hover-bg: #fafaf8;
      --nav-active-bg: #1a1a1a;
      --nav-active-text: #f5f5f0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    body.dark {
      --bg: #1a1a1a;
      --card-bg: #252525;
      --text: #f0f0eb;
      --text-secondary: #888;
      --border: #333;
      --hover-bg: #2a2a2a;
      --nav-active-bg: #f0f0eb;
      --nav-active-text: #1a1a1a;
    }

    /* ===== HEADER ===== */
    header {
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid var(--border);
      background: rgba(245, 245, 240, 0.8);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
      height: 150px;
    }

    body.dark header {
      background: rgba(26, 26, 26, 0.8);
    }

    .logo {
      padding: 0 40px;
      display: flex;
      align-items: center;
      white-space: nowrap;
      cursor: default;
    }

    .logo svg {
      display: block;
    }

    .nav-tabs {
      display: flex;
      align-items: stretch;
      margin-left: auto;
    }

    .nav-tab {
      padding: 0 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-left: 1px solid var(--border);
      cursor: pointer;
      font-size: 15px;
      transition: background 0.35s ease, color 0.35s ease;
      min-width: 140px;
      background: transparent;
      color: var(--text);
      text-decoration: none;
      border-top: none;
      border-bottom: none;
      border-right: none;
      font-family: inherit;
      position: relative;
    }

    .nav-tab:hover {
      background: var(--hover-bg);
    }

    .nav-tab.active {
      background: var(--nav-active-bg);
      color: var(--nav-active-text);
    }

    .nav-tab .tab-label { font-weight: 500; }
    .nav-tab .tab-count {
      font-size: 12px;
      margin-top: 6px;
      opacity: 0.6;
      min-height: 16px;
    }

    .header-right {
      display: flex;
      align-items: center;
      border-left: 1px solid var(--border);
      padding: 0 24px;
      gap: 16px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* ===== TOOLBAR ===== */
    .toolbar {
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .toolbar-row {
      display: flex;
      align-items: center;
      padding: 0 32px;
      min-height: 96px;
      border-bottom: 1px solid var(--border);
    }

    .toolbar-row:last-child {
      border-bottom: none;
    }

    .tool-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: color 0.2s;
      white-space: nowrap;
      border: none;
      background: none;
      font-family: inherit;
    }

    .tool-item:hover { color: var(--text); }

    .tool-item svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .tool-separator {
      flex: 1;
    }

    .tool-divider {
      width: 1px;
      height: 24px;
      background: var(--border);
      margin: 0 4px;
    }

    /* Search input in toolbar */
    .tool-search {
      border: none;
      background: none;
      font-size: 13px;
      color: var(--text);
      outline: none;
      width: 120px;
      font-family: inherit;
      padding: 12px 0;
    }

    .tool-search::placeholder { color: var(--text-secondary); }

    /* Custom text input */
    .tool-text-input {
      border: none;
      background: none;
      font-size: 13px;
      color: var(--text);
      outline: none;
      flex: 1;
      min-width: 200px;
      font-family: inherit;
      padding: 12px 0;
    }

    .tool-text-input::placeholder { color: var(--text-secondary); }

    /* Dropdown */
    .dropdown {
      position: relative;
    }

    .dropdown-menu {
      position: absolute;
      top: 100%;
      left: 0;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 0;
      min-width: 160px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      z-index: 200;
      display: none;
    }

    .dropdown.open .dropdown-menu {
      display: block;
    }

    .dropdown-item {
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
      color: var(--text);
    }

    .dropdown-item:hover { background: var(--hover-bg); }
    .dropdown-item.active { font-weight: 600; }

    /* Font size slider */
    .size-control {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
    }

    .size-label {
      font-size: 13px;
      color: var(--text-secondary);
      min-width: 45px;
    }

    .size-slider {
      -webkit-appearance: none;
      width: 120px;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }

    .size-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--text);
      cursor: pointer;
    }

    /* Preview mode tabs */
    .preview-tabs {
      display: flex;
      gap: 0;
    }

    .preview-tab {
      padding: 12px 12px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
      transition: color 0.2s;
    }

    .preview-tab:hover { color: var(--text); }
    .preview-tab.active { color: var(--text); font-weight: 600; }

    /* Align buttons */
    .align-btn {
      padding: 8px;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--text-secondary);
      transition: color 0.2s;
      display: flex;
      align-items: center;
    }

    .align-btn:hover, .align-btn.active { color: var(--text); }

    .align-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    /* Theme toggle */
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .theme-btn {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }

    .theme-btn.light-btn { background: var(--bg); }
    .theme-btn.dark-btn { background: #1a1a1a; }
    .theme-btn.active { border-color: var(--text); }

    /* Reset */
    .reset-btn {
      padding: 12px 16px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
      transition: color 0.2s;
    }

    .reset-btn:hover { color: var(--text); }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: var(--bg);
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      z-index: 999;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== LOADING / UNSUPPORTED ===== */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 120px 40px;
      gap: 16px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text { font-size: 15px; color: var(--text-secondary); }

    .unsupported {
      text-align: center;
      padding: 120px 40px;
    }

    .unsupported h2 { font-size: 24px; margin-bottom: 12px; }
    .unsupported p { color: var(--text-secondary); font-size: 15px; line-height: 1.6; }

    .pick-btn {
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .pick-btn:hover { opacity: 0.85; transform: scale(1.02); }

    /* ===== GRID ===== */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 0;
    }

    /* ===== CARD ===== */
    .card {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 32px;
      cursor: pointer;
      transition: background 0.2s;
      animation: fadeUp 0.4s ease both;
    }

    .card:hover { background: var(--hover-bg); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-preview {
      line-height: 1.2;
      margin-bottom: 20px;
      min-height: 60px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: letter-spacing 0.3s;
    }

    .card:hover .card-preview { letter-spacing: 1px; }

    .card-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-name {
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      line-height: 1;
    }

    .card-category {
      font-size: 12px;
      color: var(--text-secondary);
      background: var(--bg);
      padding: 3px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .card-hint {
      font-size: 12px;
      color: var(--text);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .card:hover .card-hint { opacity: 0.5; }

    /* ===== GLYPH VIEW ===== */
    .glyph-view {
      display: none;
    }

    .glyph-view.active {
      display: block;
    }

    .glyph-header {
      display: flex;
      align-items: center;
      padding: 24px 40px;
      border-bottom: 1px solid var(--border);
      gap: 16px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 50;
    }

    .glyph-back {
      border: none;
      background: none;
      cursor: pointer;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 0;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .glyph-back:hover { background: var(--hover-bg); }

    .glyph-back svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .glyph-font-name {
      font-size: 24px;
      font-weight: 700;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .glyph-font-styles {
      font-size: 13px;
      color: var(--text-secondary);
      margin-left: auto;
    }

    .glyph-body {
      display: flex;
    }

    /* Left metrics panel — fixed/sticky while right side scrolls */
    .glyph-metrics-panel {
      width: 50%;
      border-right: 1px solid var(--border);
      flex-shrink: 0;
      position: sticky;
      top: 70px;
      height: calc(100vh - 70px);
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    .glyph-metrics-canvas-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 20px 40px;
    }

    .glyph-metrics-canvas-wrap canvas {
      display: block;
    }

    .glyph-metrics-details {
      padding: 16px 40px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-secondary);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .glyph-metrics-details span {
      display: flex;
      justify-content: space-between;
    }

    .glyph-metrics-details .label { opacity: 0.6; }
    .glyph-metrics-details .value { color: var(--text); font-variant-numeric: tabular-nums; }

    .glyph-main {
      flex: 1;
      min-width: 0;
    }

    .glyph-block-title {
      font-size: 14px;
      font-weight: 600;
      padding: 20px 24px 12px;
      color: var(--text-secondary);
    }

    .glyph-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
      padding: 0 24px 24px;
    }

    .glyph-cell {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      margin: -0.5px;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }

    .glyph-cell:hover {
      background: var(--hover-bg);
      z-index: 1;
      border-color: var(--text-secondary);
    }

    .glyph-cell.glyph-selected {
      background: var(--text);
      color: var(--bg);
      z-index: 2;
      border-color: var(--text);
    }

    .glyph-cell.glyph-selected .glyph-char { color: var(--bg); }
    .glyph-cell.glyph-selected .glyph-code { color: var(--bg); opacity: 0.6; }

    .glyph-cell .glyph-char {
      font-size: 24px;
      line-height: 1;
    }

    .glyph-cell .glyph-code {
      font-size: 9px;
      color: var(--text-secondary);
      margin-top: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .glyph-cell:hover .glyph-code { opacity: 1; }

    .card-styles {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* Text align modes */
    .card-preview.align-left { text-align: left; }
    .card-preview.align-center { text-align: center; }
    .card-preview.align-right { text-align: right; }

    /* Star / Favorite */
    .star-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      padding: 0;
      transition: transform 0.2s, opacity 0.2s;
      line-height: 1;
      opacity: 0.5;
      color: var(--text);
      display: inline-flex;
      align-items: center;
      vertical-align: middle;
      margin-left: 6px;
    }

    .star-btn:hover { transform: scale(1.2); opacity: 0.8; }

    .star-btn.favorited {
      opacity: 1;
      animation: starPop 0.3s ease;
    }

    @keyframes starPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.4); }
      100% { transform: scale(1); }
    }

    /* Info button & tooltip */
    .card { position: relative; }

    .card-info-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: var(--text-secondary);
      opacity: 0;
      transition: opacity 0.2s, background 0.15s;
      z-index: 5;
    }

    .card:hover .card-info-btn { opacity: 1; }
    .card-info-btn:hover { background: var(--hover-bg); color: var(--text); }

    .card-info-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .font-tooltip {
      display: none;
      position: absolute;
      top: 40px;
      right: 12px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      min-width: 200px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      z-index: 10;
      font-size: 12px;
      line-height: 1.8;
      color: var(--text);
      pointer-events: none;
    }

    .card-info-btn:hover + .font-tooltip,
    .font-tooltip:hover {
      display: block;
    }

    .font-tooltip .tt-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
    }

    .font-tooltip .tt-label {
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .font-tooltip .tt-value {
      font-weight: 500;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .font-tooltip .tt-loading {
      color: var(--text-secondary);
      text-align: center;
      padding: 8px 0;
    }
</style>
</head>
<body>
  <!-- HEADER -->
  <header>
    <div class="logo"><svg id="logoSvg" aria-label="Fontssss view"></svg></div>
    <nav class="nav-tabs">
      <button class="nav-tab active" data-tab="all" onclick="switchTab('all')">
        <span class="tab-label">All Fonts</span>
        <span class="tab-count" id="navFontCount">0</span>
      </button>
      <button class="nav-tab" data-tab="misans" onclick="switchTab('misans')">
        <span class="tab-label">MiSans</span>
        <span class="tab-count" id="navMiSansCount"></span>
      </button>
      <button class="nav-tab" data-tab="favorites" onclick="switchTab('favorites')">
        <span class="tab-label">♥ 收藏</span>
        <span class="tab-count" id="navFavCount">0</span>
      </button>
    </nav>
  </header>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <!-- Row 1 -->
    <div class="toolbar-row">
      <button class="tool-item" id="searchToggle">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Search
      </button>
      <input type="text" class="tool-search" id="searchBox" placeholder="Type to search..." style="display:none" />

      <div class="tool-divider"></div>

      <!-- Categories dropdown -->
      <div class="dropdown" id="catDropdown">
        <button class="tool-item" onclick="toggleDropdown('catDropdown')">
          Categories
          <svg viewBox="0 0 24 24" width="10" height="10"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="dropdown-menu">
          <div class="dropdown-item active" data-cat="all" onclick="setCategory('all')">All</div>
          <div class="dropdown-item" data-cat="sans-serif" onclick="setCategory('sans-serif')">Sans-Serif</div>
          <div class="dropdown-item" data-cat="serif" onclick="setCategory('serif')">Serif</div>
          <div class="dropdown-item" data-cat="monospace" onclick="setCategory('monospace')">Monospace</div>
          <div class="dropdown-item" data-cat="cursive" onclick="setCategory('cursive')">Script / Cursive</div>
        </div>
      </div>

      <div class="tool-separator"></div>

      <!-- Properties dropdown -->
      <div class="dropdown" id="propDropdown">
        <button class="tool-item" onclick="toggleDropdown('propDropdown')">
          Properties
          <svg viewBox="0 0 24 24" width="10" height="10"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="dropdown-menu">
          <div class="dropdown-item active" data-prop="all" onclick="setProperty('all')">All</div>
          <div class="dropdown-item" data-prop="multi" onclick="setProperty('multi')">Multiple styles</div>
          <div class="dropdown-item" data-prop="single" onclick="setProperty('single')">Single style</div>
        </div>
      </div>

      <div class="tool-separator"></div>

      <!-- Font size slider -->
      <div class="size-control">
        <span class="size-label" id="sizeLabel">32px</span>
        <input type="range" class="size-slider" id="sizeSlider" min="24" max="160" value="32" />
      </div>
    </div>

    <!-- Row 2 -->
    <div class="toolbar-row">
      <button class="tool-item" id="textToggle">
        <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Your Text
      </button>
      <input type="text" class="tool-text-input" id="customText" placeholder="Type preview text..." />

      <div class="tool-separator"></div>

      <!-- Preview mode -->
      <div class="preview-tabs">
        <button class="preview-tab" data-mode="cities" onclick="setPreviewMode('cities')">Cities</button>
        <button class="preview-tab" data-mode="excerpts" onclick="setPreviewMode('excerpts')">Excerpts</button>
        <button class="preview-tab" data-mode="numbers" onclick="setPreviewMode('numbers')">Numbers</button>
        <button class="preview-tab active" data-mode="names" onclick="setPreviewMode('names')">Names</button>
      </div>

      <div class="tool-divider"></div>

      <!-- Alignment -->
      <button class="align-btn active" data-align="left" onclick="setAlign('left')">
        <svg viewBox="0 0 24 24"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="17" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="3" y2="18"/></svg>
      </button>
      <button class="align-btn" data-align="center" onclick="setAlign('center')">
        <svg viewBox="0 0 24 24"><line x1="18" y1="10" x2="6" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="18" y1="14" x2="6" y2="14"/><line x1="21" y1="18" x2="3" y2="18"/></svg>
      </button>
      <button class="align-btn" data-align="right" onclick="setAlign('right')">
        <svg viewBox="0 0 24 24"><line x1="21" y1="10" x2="7" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="7" y2="14"/><line x1="21" y1="18" x2="3" y2="18"/></svg>
      </button>

      <div class="tool-divider"></div>

      <!-- Theme toggle -->
      <div class="theme-toggle">
        <div class="theme-btn light-btn active" onclick="setTheme('light')"></div>
        <div class="theme-btn dark-btn" onclick="setTheme('dark')"></div>
      </div>

      <div class="tool-divider"></div>

      <button class="reset-btn" onclick="resetAll()">Reset All</button>

  </div>

  <div id="app"></div>
  <div class="toast" id="toast"></div>

  <!-- GLYPH VIEW -->
  <div class="glyph-view" id="glyphView">
    <div class="glyph-header">
      <button class="glyph-back" onclick="hideGlyphView()">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </button>
      <span class="glyph-font-name" id="glyphFontName"></span>
      <span class="glyph-font-styles" id="glyphFontStyles"></span>
    </div>
    <div class="glyph-body">
      <div class="glyph-metrics-panel" id="glyphMetricsPanel">
        <div class="glyph-metrics-canvas-wrap">
          <canvas id="glyphMetricsCanvas" width="380" height="400"></canvas>
        </div>
        <div class="glyph-metrics-details" id="glyphMetricsDetails"></div>
      </div>
      <div class="glyph-main" id="glyphMain"></div>
    </div>
  </div>

  <!-- GLYPH DETAIL OVERLAY (removed - using left metrics panel instead) -->

  <script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
  <script>
    // ---- State ----
    let allFonts = [];
    let currentFilter = 'all';
    let currentProperty = 'all';
    let currentTab = 'all';
    let searchQuery = '';
    let fontSize = 32;
    let previewMode = 'names';
    let textAlign = 'left';
    let customText = '';

    // ---- Favorites (persisted in localStorage) ----
    let favorites = new Set();
    try {
      const stored = localStorage.getItem('fontssss_favorites');
      if (stored) favorites = new Set(JSON.parse(stored));
    } catch (e) { /* corrupted data, start fresh */ }

    function saveFavorites() {
      try {
        localStorage.setItem('fontssss_favorites', JSON.stringify([...favorites]));
      } catch (e) { /* storage full or blocked */ }
    }

    function toggleFavorite(family, event) {
      event.stopPropagation();
      if (favorites.has(family)) {
        favorites.delete(family);
      } else {
        favorites.add(family);
      }
      saveFavorites();
      render();
    }

    const CITIES = ['Hamburg', 'Tokyo', 'São Paulo', 'Melbourne', 'Reykjavik', 'Nairobi', 'Montréal', 'Zürich', 'Bangalore', 'Oslo'];
    const EXCERPTS = [
      'The quick brown fox jumps over the lazy dog',
      'Pack my box with five dozen liquor jugs',
      'How vexingly quick daft zebras jump',
      'Sphinx of black quartz judge my vow',
      'Two driven jocks help fax my big quiz',
      'Bright vixens jump dozy fowl quack',
      'Jackdaws love my big sphinx of quartz',
      'Grumpy wizards make toxic brew for the evil queen',
      'Few quips galvanized the mock jury box',
      'The five boxing wizards jump quickly'
    ];

    // ---- Toast ----
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    // ---- Copy ----
    function copyName(name) {
      navigator.clipboard.writeText(name).then(() => showToast(`Copied "${name}"`));
    }

    // ---- Classify font ----
    function classifyFont(family) {
      const f = family.toLowerCase();
      if (/mono|consol|courier|code|fira\s?code|jetbrains|hack|menlo|source\s?code/i.test(f)) return 'monospace';
      if (/script|cursive|hand|brush|dancing|pacifico|caveat|satisfy/i.test(f)) return 'cursive';
      if (/serif|georgia|times|garamond|palatino|baskerville|cambria|didot|bodoni/i.test(f)) {
        if (/sans/i.test(f)) return 'sans-serif';
        return 'serif';
      }
      return 'sans-serif';
    }

    // ---- Get preview text ----
    function getPreviewText(font, index) {
      if (customText) return customText;
      switch (previewMode) {
        case 'cities': return CITIES[index % CITIES.length];
        case 'excerpts': return EXCERPTS[index % EXCERPTS.length];
        case 'numbers': return '0123456789';
        case 'names': default: return font.family;
      }
    }

    // ---- Dropdown ----
    function toggleDropdown(id) {
      const el = document.getElementById(id);
      const wasOpen = el.classList.contains('open');
      document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
      if (!wasOpen) el.classList.add('open');
    }

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.dropdown')) {
        document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
      }
    });

    // ---- Filters ----
    function setCategory(cat) {
      currentFilter = cat;
      document.querySelectorAll('#catDropdown .dropdown-item').forEach(i => i.classList.toggle('active', i.dataset.cat === cat));
      document.getElementById('catDropdown').classList.remove('open');
      render();
    }

    function setProperty(prop) {
      currentProperty = prop;
      document.querySelectorAll('#propDropdown .dropdown-item').forEach(i => i.classList.toggle('active', i.dataset.prop === prop));
      document.getElementById('propDropdown').classList.remove('open');
      render();
    }

    function setPreviewMode(mode) {
      previewMode = mode;
      document.querySelectorAll('.preview-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
      render();
    }

    function setAlign(align) {
      textAlign = align;
      document.querySelectorAll('.align-btn').forEach(b => b.classList.toggle('active', b.dataset.align === align));
      render();
    }

    function setTheme(theme) {
      document.body.classList.toggle('dark', theme === 'dark');
      document.querySelectorAll('.theme-btn').forEach(b => {
        b.classList.toggle('active', (theme === 'light' && b.classList.contains('light-btn')) || (theme === 'dark' && b.classList.contains('dark-btn')));
      });
    }

    function resetAll() {
      currentFilter = 'all';
      currentProperty = 'all';
      searchQuery = '';
      fontSize = 32;
      previewMode = 'names';
      textAlign = 'left';
      customText = '';
      document.getElementById('searchBox').value = '';
      document.getElementById('searchBox').style.display = 'none';
      document.getElementById('customText').value = '';
      document.getElementById('customText').style.display = 'none';
      document.getElementById('sizeSlider').value = 32;
      document.getElementById('sizeLabel').textContent = '32px';
      document.body.classList.remove('dark');
      document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.classList.contains('light-btn')));
      document.querySelectorAll('.preview-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === 'names'));
      document.querySelectorAll('.align-btn').forEach(b => b.classList.toggle('active', b.dataset.align === 'left'));
      document.querySelectorAll('#catDropdown .dropdown-item').forEach(i => i.classList.toggle('active', i.dataset.cat === 'all'));
      document.querySelectorAll('#propDropdown .dropdown-item').forEach(i => i.classList.toggle('active', i.dataset.prop === 'all'));
      render();
    }

    // ---- Tab switch ----
    function switchTab(tab) {
      // If in glyph view, exit first
      if (document.getElementById('glyphView').classList.contains('active')) {
        hideGlyphView();
      }
      currentTab = tab;
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
      render();
    }

    // ---- Render ----
    function render() {
      const app = document.getElementById('app');
      let fonts = allFonts;

      // Tab filter
      if (currentTab === 'misans') {
        fonts = fonts.filter(f => /misan/i.test(f.family));
      } else if (currentTab === 'favorites') {
        fonts = fonts.filter(f => favorites.has(f.family));
      }

      if (currentFilter !== 'all') fonts = fonts.filter(f => f.category === currentFilter);
      if (currentProperty === 'multi') fonts = fonts.filter(f => f.styleCount > 1);
      if (currentProperty === 'single') fonts = fonts.filter(f => f.styleCount === 1);
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        fonts = fonts.filter(f => f.family.toLowerCase().includes(q));
      }

      // Sort: favorites first, then alphabetical
      if (currentTab !== 'favorites') {
        fonts.sort((a, b) => {
          const aFav = favorites.has(a.family) ? 0 : 1;
          const bFav = favorites.has(b.family) ? 0 : 1;
          if (aFav !== bFav) return aFav - bFav;
          return a.family.localeCompare(b.family);
        });
      }

      // Update counts
      document.getElementById('navFontCount').textContent = allFonts.length;
      const miSansCount = allFonts.filter(f => /misan/i.test(f.family)).length;
      document.getElementById('navMiSansCount').textContent = miSansCount || '';
      document.getElementById('navFavCount').textContent = favorites.size;

      if (fonts.length === 0) {
        app.innerHTML = `<div style="text-align:center;padding:80px 40px;color:var(--text-secondary);"><p style="font-size:18px;">No fonts found</p></div>`;
        return;
      }

      app.innerHTML = `<div class="grid">${fonts.map((f, i) => {
        const isFav = favorites.has(f.family);
        const escapedFamily = f.family.replace(/'/g, "\\'");
        return `
        <div class="card" style="animation-delay:${Math.min(i * 20, 400)}ms" onclick="handleCardClick('${escapedFamily}')" ondblclick="handleCardDblClick(event, '${escapedFamily}', ${f.styleCount})">
          <button class="card-info-btn" onclick="event.stopPropagation()" onmouseenter="loadFontInfo(this, '${escapedFamily}')">
            <svg viewBox="0 0 120 120" width="16" height="16"><path d="M89.5 111.1C80.4 116.5 70.4 119.1 59.6 119.1C48.8 119.1 38.9 116.5 29.8 111.1C20.7 105.8 13.4 98.6 8.1 89.5C2.7 80.4 0 70.4 0 59.6C0 48.8 2.7 38.9 8.1 29.8C13.4 20.7 20.7 13.4 29.8 8.1C38.9 2.7 48.8 0 59.6 0C70.4 0 80.4 2.7 89.5 8.1C98.6 13.4 105.8 20.7 111.1 29.8C116.5 38.9 119.1 48.8 119.1 59.6C119.1 70.4 116.5 80.4 111.1 89.5C105.8 98.6 98.6 105.8 89.5 111.1ZM34.7 102.6C42.3 107 50.6 109.2 59.6 109.2C68.6 109.2 76.8 107 84.4 102.6C92 98.1 98 92.1 102.5 84.6C107 77 109.2 68.7 109.2 59.6C109.2 50.6 107 42.3 102.5 34.8C98 27.1 92 21.1 84.4 16.7C76.8 12.3 68.6 10 59.6 10C50.6 10 42.3 12.3 34.7 16.7C27.1 21.1 21.1 27.1 16.7 34.8C12.3 42.3 10 50.6 10 59.6C10 68.7 12.3 77 16.7 84.6C21.1 92.1 27.1 98.1 34.7 102.6ZM64.1 36.6C62.8 37.9 61.3 38.5 59.6 38.5C57.9 38.5 56.4 37.9 55.1 36.6C53.8 35.3 53.2 33.8 53.2 32.1C53.2 30.4 53.8 28.9 55.1 27.7C56.3 26.4 57.8 25.8 59.6 25.8C61.4 25.8 62.9 26.4 64.1 27.7C65.3 28.8 65.9 30.3 65.9 32.1C65.9 33.9 65.3 35.4 64.1 36.6ZM63.6 92.5C63.1 93.1 62.3 93.4 61.3 93.4H58C57 93.4 56.2 93.1 55.5 92.5C54.9 92 54.6 91.2 54.6 90.2V48.3C54.6 47.5 54.9 46.7 55.4 46.1C56.1 45.5 56.9 45.2 57.9 45.2H61.1C62.3 45.2 63.2 45.5 63.7 46.1C64.3 46.6 64.5 47.4 64.5 48.3V90.2C64.5 91.2 64.2 92 63.6 92.5Z" fill="currentColor"/></svg>
          </button>
          <div class="font-tooltip" id="tt-${i}"><div class="tt-loading">Loading...</div></div>
          <div class="card-preview align-${textAlign}" style="font-family:'${f.family}',sans-serif;font-size:${fontSize}px">
            ${getPreviewText(f, i)}
          </div>
          <div class="card-info">
            <div>
              <div class="card-name">
                ${f.family}
                <button class="star-btn ${isFav ? 'favorited' : ''}" onclick="toggleFavorite('${escapedFamily}', event)" title="${isFav ? 'Remove from favorites' : 'Add to favorites'}">
                  ${isFav ? '<svg viewBox="0 0 24 24" width="12" height="12"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="currentColor" stroke="none"/></svg>' : '<svg viewBox="0 0 24 24" width="12" height="12"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>'}
                </button>
              </div>
              <div class="card-styles">${f.styleCount} style${f.styleCount > 1 ? 's' : ''}</div>
            </div>
          </div>
        </div>`;
      }).join('')}</div>`;
    }

    // ---- Font info tooltip ----
    const fontInfoCache = new Map();

    async function loadFontInfo(btn, family) {
      const tooltip = btn.nextElementSibling;
      if (fontInfoCache.has(family)) {
        tooltip.innerHTML = fontInfoCache.get(family);
        return;
      }

      let arrayBuffer = null;
      // Try Local Font Access API
      if ('queryLocalFonts' in window) {
        try {
          const fonts = await window.queryLocalFonts();
          const match = fonts.find(f => f.family === family);
          if (match) {
            const blob = await match.blob();
            arrayBuffer = await blob.arrayBuffer();
          }
        } catch (e) { /* fall through */ }
      }
      // Try cached blob
      if (!arrayBuffer && fontBlobCache.has(family)) {
        arrayBuffer = fontBlobCache.get(family);
      }

      if (!arrayBuffer) {
        const html = '<div class="tt-loading">Unable to read font data</div>';
        tooltip.innerHTML = html;
        fontInfoCache.set(family, html);
        return;
      }

      try {
        const font = opentype.parse(arrayBuffer);
        const name = font.names;
        const os2 = font.tables.os2;
        const head = font.tables.head;
        const version = (name.version && name.version.en) || (head ? `${head.fontRevision.toFixed(1)}` : '—');
        const format = head && head.magicNumber === 0x5F0F3CF5 ? 'TrueType / OpenType' : 'OpenType';
        const glyphCount = font.glyphs.length;
        const unitsPerEm = font.unitsPerEm;
        const designer = (name.designer && name.designer.en) || '—';
        const license = (name.license && name.license.en) || '—';

        const html = `
          <div class="tt-row"><span class="tt-label">格式</span><span class="tt-value">${format}</span></div>
          <div class="tt-row"><span class="tt-label">字形数</span><span class="tt-value">${glyphCount.toLocaleString()}</span></div>
          <div class="tt-row"><span class="tt-label">Units/Em</span><span class="tt-value">${unitsPerEm}</span></div>
          <div class="tt-row"><span class="tt-label">版本</span><span class="tt-value">${version}</span></div>
          <div class="tt-row"><span class="tt-label">设计师</span><span class="tt-value" style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${designer}</span></div>
        `;
        tooltip.innerHTML = html;
        fontInfoCache.set(family, html);
      } catch (e) {
        const html = '<div class="tt-loading">Parse error</div>';
        tooltip.innerHTML = html;
        fontInfoCache.set(family, html);
      }
    }

    // ---- Single click / double click handling ----
    let clickTimer = null;
    function handleCardClick(family) {
      if (clickTimer) return; // ignore if dblclick pending
      clickTimer = setTimeout(() => {
        clickTimer = null;
        copyName(family);
      }, 250);
    }
    function handleCardDblClick(event, family, styleCount) {
      event.preventDefault();
      if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; }
      showGlyphView(family, styleCount); // async, runs in background
    }

    // ---- Unicode block definitions for classification ----
    const BLOCK_RANGES = [
      { name: 'Basic Latin', start: 0x0000, end: 0x007F },
      { name: 'Latin-1 Supplement', start: 0x0080, end: 0x00FF },
      { name: 'Latin Extended-A', start: 0x0100, end: 0x017F },
      { name: 'Latin Extended-B', start: 0x0180, end: 0x024F },
      { name: 'IPA Extensions', start: 0x0250, end: 0x02AF },
      { name: 'Spacing Modifier Letters', start: 0x02B0, end: 0x02FF },
      { name: 'Combining Diacritical Marks', start: 0x0300, end: 0x036F },
      { name: 'Greek and Coptic', start: 0x0370, end: 0x03FF },
      { name: 'Cyrillic', start: 0x0400, end: 0x04FF },
      { name: 'Armenian', start: 0x0530, end: 0x058F },
      { name: 'Hebrew', start: 0x0590, end: 0x05FF },
      { name: 'Arabic', start: 0x0600, end: 0x06FF },
      { name: 'Thai', start: 0x0E00, end: 0x0E7F },
      { name: 'Georgian', start: 0x10A0, end: 0x10FF },
      { name: 'Hangul Jamo', start: 0x1100, end: 0x11FF },
      { name: 'Latin Extended Additional', start: 0x1E00, end: 0x1EFF },
      { name: 'Greek Extended', start: 0x1F00, end: 0x1FFF },
      { name: 'General Punctuation', start: 0x2000, end: 0x206F },
      { name: 'Superscripts and Subscripts', start: 0x2070, end: 0x209F },
      { name: 'Currency Symbols', start: 0x20A0, end: 0x20CF },
      { name: 'Combining Marks for Symbols', start: 0x20D0, end: 0x20FF },
      { name: 'Letterlike Symbols', start: 0x2100, end: 0x214F },
      { name: 'Number Forms', start: 0x2150, end: 0x218F },
      { name: 'Arrows', start: 0x2190, end: 0x21FF },
      { name: 'Mathematical Operators', start: 0x2200, end: 0x22FF },
      { name: 'Miscellaneous Technical', start: 0x2300, end: 0x23FF },
      { name: 'Enclosed Alphanumerics', start: 0x2460, end: 0x24FF },
      { name: 'Box Drawing', start: 0x2500, end: 0x257F },
      { name: 'Block Elements', start: 0x2580, end: 0x259F },
      { name: 'Geometric Shapes', start: 0x25A0, end: 0x25FF },
      { name: 'Miscellaneous Symbols', start: 0x2600, end: 0x26FF },
      { name: 'Dingbats', start: 0x2700, end: 0x27BF },
      { name: 'CJK Symbols and Punctuation', start: 0x3000, end: 0x303F },
      { name: 'Hiragana', start: 0x3040, end: 0x309F },
      { name: 'Katakana', start: 0x30A0, end: 0x30FF },
      { name: 'Bopomofo', start: 0x3100, end: 0x312F },
      { name: 'CJK Compatibility', start: 0x3300, end: 0x33FF },
      { name: 'CJK Unified Ideographs', start: 0x4E00, end: 0x9FFF },
      { name: 'Hangul Syllables', start: 0xAC00, end: 0xD7AF },
      { name: 'Private Use Area', start: 0xE000, end: 0xF8FF },
      { name: 'CJK Compatibility Ideographs', start: 0xF900, end: 0xFAFF },
      { name: 'Alphabetic Presentation Forms', start: 0xFB00, end: 0xFB4F },
      { name: 'Arabic Presentation Forms-A', start: 0xFB50, end: 0xFDFF },
      { name: 'Halfwidth and Fullwidth Forms', start: 0xFF00, end: 0xFFEF },
    ];

    function getBlockName(cp) {
      for (const b of BLOCK_RANGES) {
        if (cp >= b.start && cp <= b.end) return b.name;
      }
      if (cp > 0xFFFF) return 'Supplementary';
      return 'Other';
    }

    // Store font binary data for opentype.js parsing
    let fontBlobCache = new Map();
    let currentGlyphFont = '';
    let currentOTFont = null; // opentype.js font object for metrics
    let selectedGlyphCP = null;

    function goHome() {
      if (document.getElementById('glyphView').classList.contains('active')) {
        hideGlyphView();
      }
    }

    async function showGlyphView(family, styleCount) {
      currentGlyphFont = family;
      currentOTFont = null;
      selectedGlyphCP = null;

      // Push browser history so back button returns to font list
      history.pushState({ view: 'glyph', family, styleCount }, '', '#glyph/' + encodeURIComponent(family));

      const glyphView = document.getElementById('glyphView');
      const app = document.getElementById('app');
      const toolbar = document.querySelector('.toolbar');

      document.getElementById('glyphFontName').textContent = family;
      document.getElementById('glyphFontStyles').textContent = `${styleCount} style${styleCount > 1 ? 's' : ''}`;

      // Show loading state
      const main = document.getElementById('glyphMain');
      main.innerHTML = '<div class="loading"><div class="spinner"></div><div class="loading-text">Parsing font glyphs...</div></div>';
      drawMetricsPlaceholder();

      app.style.display = 'none';
      toolbar.style.display = 'none';
      glyphView.classList.add('active');

      // Get font binary and parse with opentype.js
      try {
        const { cps, font } = await getFontCodepointsAndFont(family);
        currentOTFont = font;
        if (cps.length === 0) {
          main.innerHTML = '<div style="text-align:center;padding:80px;color:var(--text-secondary)">Could not read glyph data for this font.</div>';
          return;
        }

        // Group by Unicode block
        const blockMap = new Map();
        for (const cp of cps) {
          if (cp < 0x0020) continue;
          const blockName = getBlockName(cp);
          if (!blockMap.has(blockName)) blockMap.set(blockName, []);
          blockMap.get(blockName).push(cp);
        }

        const blocks = Array.from(blockMap.entries())
          .map(([name, cps]) => ({ name, cps: cps.sort((a, b) => a - b) }))
          .sort((a, b) => a.cps[0] - b.cps[0]);

        renderGlyphGridFromBlocks(family, blocks);

        // Auto-select first glyph (capital A if available, else first)
        const firstCP = cps.includes(0x0041) ? 0x0041 : (cps.find(c => c >= 0x0020) || cps[0]);
        selectGlyph(firstCP, family);
      } catch (e) {
        console.error('Glyph parse error:', e);
        main.innerHTML = '<div style="text-align:center;padding:80px;color:var(--text-secondary)">Failed to parse font data.</div>';
      }
    }

    async function getFontCodepointsAndFont(family) {
      let arrayBuffer = null;

      if ('queryLocalFonts' in window) {
        try {
          const fonts = await window.queryLocalFonts();
          const match = fonts.find(f => f.family === family);
          if (match) {
            const blob = await match.blob();
            arrayBuffer = await blob.arrayBuffer();
          }
        } catch (e) { /* fall through */ }
      }

      if (!arrayBuffer && fontBlobCache.has(family)) {
        arrayBuffer = fontBlobCache.get(family);
      }

      if (!arrayBuffer) return { cps: [], font: null };

      const font = opentype.parse(arrayBuffer);
      const cps = [];
      for (let i = 0; i < font.glyphs.length; i++) {
        const glyph = font.glyphs.get(i);
        if (glyph.unicode !== undefined && glyph.unicode !== null) {
          cps.push(glyph.unicode);
        }
        if (glyph.unicodes && glyph.unicodes.length > 1) {
          for (const u of glyph.unicodes) {
            if (u !== glyph.unicode) cps.push(u);
          }
        }
      }
      return { cps: [...new Set(cps)], font };
    }

    function selectGlyph(cp, family) {
      selectedGlyphCP = cp;
      // Highlight in grid
      document.querySelectorAll('.glyph-cell').forEach(c => c.classList.remove('glyph-selected'));

      if (target) target.classList.add('glyph-selected');

      // Draw metrics canvas
      drawGlyphMetrics(cp, family);

      // Update details
      const hex = cp.toString(16).toUpperCase().padStart(4, '0');
      const ch = String.fromCodePoint(cp);
      const details = document.getElementById('glyphMetricsDetails');
      if (currentOTFont) {
        const glyph = currentOTFont.charToGlyph(ch);
        const unitsPerEm = currentOTFont.unitsPerEm;
        const ascender = currentOTFont.ascender;
        const descender = currentOTFont.descender;
        const xHeight = currentOTFont.tables.os2 ? currentOTFont.tables.os2.sxHeight : '—';
        const capHeight = currentOTFont.tables.os2 ? currentOTFont.tables.os2.sCapHeight : '—';
        const advWidth = glyph.advanceWidth || 0;
        const bbox = glyph.getBoundingBox ? glyph.getBoundingBox() : null;

        details.innerHTML = `
          <span><span class="label">Unicode</span><span class="value">U+${hex}</span></span>
          <span><span class="label">Decimal</span><span class="value">${cp}</span></span>
          <span><span class="label">Units/Em</span><span class="value">${unitsPerEm}</span></span>
          <span><span class="label">Advance Width</span><span class="value">${advWidth}</span></span>
          <span><span class="label">Ascender</span><span class="value">${ascender}</span></span>
          <span><span class="label">Descender</span><span class="value">${descender}</span></span>
          <span><span class="label">Cap Height</span><span class="value">${capHeight || '—'}</span></span>
          <span><span class="label">x-Height</span><span class="value">${xHeight || '—'}</span></span>
          ${bbox ? `<span><span class="label">Bbox</span><span class="value">${Math.round(bbox.x1)}, ${Math.round(bbox.y1)}, ${Math.round(bbox.x2)}, ${Math.round(bbox.y2)}</span></span>` : ''}

    function drawGlyphMetrics(cp, family) {
      const canvas = document.getElementById('glyphMetricsCanvas');
      const wrap = canvas.parentElement;
      const W = wrap.clientWidth - 40;
      const H = wrap.clientHeight - 10;
      if (W <= 0 || H <= 0) return;
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.scale(dpr, dpr);

      const isDark = document.body.classList.contains('dark');
      const bgColor = isDark ? '#1a1a1a' : '#f5f5f0';
      const textColor = isDark ? '#f0f0eb' : '#1a1a1a';
      const lineColor = isDark ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.08)';
      const labelColor = isDark ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.3)';

      ctx.clearRect(0, 0, W, H);

      if (!currentOTFont) return;

      const ch = String.fromCodePoint(cp);
      const glyph = currentOTFont.charToGlyph(ch);
      const unitsPerEm = currentOTFont.unitsPerEm;
      const ascender = currentOTFont.ascender;
      const descender = currentOTFont.descender;
      const os2 = currentOTFont.tables.os2;
      const capHeight = os2 ? (os2.sCapHeight || ascender) : ascender;
      const xHeight = os2 ? (os2.sxHeight || Math.round(ascender * 0.5)) : Math.round(ascender * 0.5);

      // Scale to fit canvas — use the smaller of height/width scale to avoid overflow
      const totalHeight = ascender - descender;
      const leftPad = 90;
      const vScale = (H - 80) / totalHeight;
      const hScale = (W - leftPad - 40) / unitsPerEm;
      const scale = Math.min(vScale, hScale);
      const baselineY = (H - totalHeight * scale) / 2 + ascender * scale;

      // Metric lines — all gray, left-aligned labels
      const lineColor2 = isDark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.12)';
      const labelGray = isDark ? 'rgba(255,255,255,0.4)' : 'rgba(0,0,0,0.35)';
      const rawMetrics = [
        { name: 'Ascender', y: baselineY - ascender * scale },
        { name: 'Cap height', y: baselineY - capHeight * scale },
        { name: 'x-height', y: baselineY - xHeight * scale },
        { name: 'Baseline', y: baselineY },
        { name: 'Descender', y: baselineY - descender * scale },
      ];

      // Remove duplicate lines (same pixel position within 2px)
      const dedupedMetrics = [];
      const usedY = [];
      for (const m of rawMetrics) {
        const tooClose = usedY.some(y => Math.abs(y - m.y) < 3);
        if (!tooClose) {
          dedupedMetrics.push(m);
          usedY.push(m.y);
        }
      }

      dedupedMetrics.sort((a, b) => a.y - b.y);

      // Draw metric lines and labels
      ctx.font = '11px -apple-system, sans-serif';
      ctx.textBaseline = 'middle';
      for (const m of dedupedMetrics) {
        // Dashed line
        ctx.strokeStyle = labelGray;
        ctx.globalAlpha = 0.6;
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(leftPad - 5, m.y);
        ctx.lineTo(W, m.y);
        ctx.stroke();
        ctx.setLineDash([]);
        // Label — left aligned, vertically centered with line
        ctx.globalAlpha = 0.8;
        ctx.fillStyle = labelGray;
        ctx.textAlign = 'left';
        ctx.fillText(m.name, 8, m.y);
      }
      ctx.textBaseline = 'alphabetic';
      ctx.globalAlpha = 1;

      // Draw glyph centered horizontally
      const glyphScale = scale;
      const glyphSize = unitsPerEm * glyphScale;
      const gBbox = glyph.getBoundingBox ? glyph.getBoundingBox() : null;
      let glyphX = leftPad + (W - leftPad) / 2 - (gBbox ? (gBbox.x1 + gBbox.x2) / 2 * glyphScale : glyphSize / 4);
      const path = glyph.getPath(glyphX, baselineY, glyphSize);
      ctx.fillStyle = textColor;
      ctx.globalAlpha = 0.85;

      // Convert opentype path to canvas
      const cmds = path.commands;
      ctx.beginPath();
      for (const cmd of cmds) {
        switch (cmd.type) {
          case 'M': ctx.moveTo(cmd.x, cmd.y); break;
          case 'L': ctx.lineTo(cmd.x, cmd.y); break;
          case 'Q': ctx.quadraticCurveTo(cmd.x1, cmd.y1, cmd.x, cmd.y); break;
          case 'C': ctx.bezierCurveTo(cmd.x1, cmd.y1, cmd.x2, cmd.y2, cmd.x, cmd.y); break;
          case 'Z': ctx.closePath(); break;
        }
      }
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    function renderGlyphGridFromBlocks(family, blocks) {

    // ---- Glyph detail ----
    function getUnicodeName(cp) {
      // Common names for frequently used ranges
      if (cp >= 0x0041 && cp <= 0x005A) return 'LATIN CAPITAL LETTER ' + String.fromCodePoint(cp);
      if (cp >= 0x0061 && cp <= 0x007A) return 'LATIN SMALL LETTER ' + String.fromCodePoint(cp).toUpperCase();
      if (cp >= 0x0030 && cp <= 0x0039) return 'DIGIT ' + String.fromCodePoint(cp);
      if (cp === 0x0020) return 'SPACE';
      return `U+${cp.toString(16).toUpperCase().padStart(4, '0')}`;
    }

    // ---- Load from font files ----
    let fontFaceCounter = 0;

    async function loadFromFiles(files) {
      const app = document.getElementById('app');
      app.innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">Loading font files...</div></div>`;

      const familyMap = new Map();
      const validExts = ['.ttf', '.otf', '.woff', '.woff2', '.ttc'];

      for (const file of files) {
        const name = file.name.toLowerCase();
        if (!validExts.some(ext => name.endsWith(ext))) continue;
        try {
          const buf = await file.arrayBuffer();
          let family = file.name.replace(/\.[^.]+$/, '')
            .replace(/[-_](Regular|Bold|Italic|Light|Medium|Thin|Black|SemiBold|ExtraBold|ExtraLight|Heavy|Condensed|Expanded|Oblique|Book|Demi|Ultra)/gi, '')
            .replace(/[-_]/g, ' ').trim();
          if (!family) family = file.name.replace(/\.[^.]+$/, '');

          const fontFace = new FontFace(family, buf);
          await fontFace.load();
          document.fonts.add(fontFace);

          // Cache the ArrayBuffer for opentype.js glyph parsing
          if (!fontBlobCache.has(family)) fontBlobCache.set(family, buf.slice(0));

          if (!familyMap.has(family)) familyMap.set(family, { family, styles: [] });
          familyMap.get(family).styles.push(file.name);
        } catch (e) { /* skip */ }
      }

      allFonts = Array.from(familyMap.values()).map(f => ({
        ...f, category: classifyFont(f.family), styleCount: f.styles.length
      }));
      allFonts.sort((a, b) => a.family.localeCompare(b.family));
      render();

      if (allFonts.length === 0) {
        app.innerHTML = `<div class="unsupported"><h2>No fonts found</h2><p>No valid font files found in the selected folder.</p><br><button class="pick-btn" onclick="pickFolder()">Try another folder</button></div>`;
      }
    }

    async function pickFolder() {
      try {
        const dirHandle = await window.showDirectoryPicker();
        const files = [];
        for await (const entry of dirHandle.values()) {
          if (entry.kind === 'file') files.push(await entry.getFile());
        }
        for await (const entry of dirHandle.values()) {
          if (entry.kind === 'directory') {
            try { for await (const sub of entry.values()) { if (sub.kind === 'file') files.push(await sub.getFile()); } } catch(e) {}
          }
        }
        await loadFromFiles(files);
      } catch (e) { /* cancelled */ }
    }

    async function loadFonts() {
      const app = document.getElementById('app');

      if ('queryLocalFonts' in window) {
        // Try auto-loading first (works if permission was already granted)
        app.innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">Reading local fonts...</div></div>`;
        try {
          const fonts = await window.queryLocalFonts();
          if (fonts && fonts.length > 0) {
            const familyMap = new Map();
            for (const font of fonts) {
              if (!familyMap.has(font.family)) familyMap.set(font.family, { family: font.family, styles: [] });
              familyMap.get(font.family).styles.push(font.style);
            }
            allFonts = Array.from(familyMap.values()).map(f => ({
              ...f, category: classifyFont(f.family), styleCount: f.styles.length
            }));
            allFonts.sort((a, b) => a.family.localeCompare(b.family));
            render();
            return;
          }
        } catch (e) {
          // Permission not granted yet — show button for user gesture
        }

        // Fallback: show button to request permission
        app.innerHTML = `
          <div class="unsupported">
            <h2>Load Your Local Fonts</h2>
            <p style="margin-bottom:24px">Click the button below to grant font access permission.</p>
            <button class="pick-btn" id="grantBtn">🔤 Load Local Fonts</button>
            <p style="margin-top:16px;font-size:13px;color:var(--text-secondary)">
              Or <a href="#" id="folderFallback" style="color:var(--text);text-decoration:underline">choose a font folder</a> manually
            </p>

        document.getElementById('grantBtn').addEventListener('click', async () => {
          app.innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">Reading local fonts...</div></div>`;
          try {
            const fonts = await window.queryLocalFonts();
            if (fonts && fonts.length > 0) {
              const familyMap = new Map();
              for (const font of fonts) {
                if (!familyMap.has(font.family)) familyMap.set(font.family, { family: font.family, styles: [] });
                familyMap.get(font.family).styles.push(font.style);
              }
              allFonts = Array.from(familyMap.values()).map(f => ({
                ...f, category: classifyFont(f.family), styleCount: f.styles.length

              allFonts.sort((a, b) => a.family.localeCompare(b.family));

    // ---- Logo: SVG bezier node editor effect ----
    const LOGO_TEXT = 'Fontssss view';
    const LOGO_FONT_SIZE = 48;
    let logoPathData = null;
    let logoSvgReady = false;
    let logoHoverActive = false;
    let logoDragging = null;
    let logoAnimFrame = null;
    let logoShowNodes = 0;
    let logoSpringFrame = null;
    const LOGO_FONT_URL = 'https://cdn.jsdelivr.net/fontsource/fonts/inter@latest/latin-700-normal.ttf';

    async function initLogo() {
      try {
        const resp = await fetch(LOGO_FONT_URL);
        const buf = await resp.arrayBuffer();
        const font = opentype.parse(buf);
        const path = font.getPath(LOGO_TEXT, 0, LOGO_FONT_SIZE * 0.78, LOGO_FONT_SIZE);
        buildLogoPathData(path.commands);
        renderLogoSvg();
        logoSvgReady = true;
      } catch (e) {
        const svg = document.getElementById('logoSvg');
        svg.innerHTML = `<text x="0" y="38" font-size="48" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" fill="currentColor">${LOGO_TEXT}</text>`;
        const bbox = svg.getBBox();
        svg.setAttribute('width', Math.ceil(bbox.width + 4));
        svg.setAttribute('height', Math.ceil(bbox.height + 4));
        svg.setAttribute('viewBox', `${bbox.x-2} ${bbox.y-2} ${bbox.width+4} ${bbox.height+4}`);
      }
    }

    function buildLogoPathData(cmds) {
      logoPathData = cmds.map(c => {
        const e = { type: c.type };
        if (c.x !== undefined) { e.x = c.x; e.origX = c.x; }
        if (c.y !== undefined) { e.y = c.y; e.origY = c.y; }
        if (c.x1 !== undefined) { e.x1 = c.x1; e.origX1 = c.x1; }
        if (c.y1 !== undefined) { e.y1 = c.y1; e.origY1 = c.y1; }
        if (c.x2 !== undefined) { e.x2 = c.x2; e.origX2 = c.x2; }
        if (c.y2 !== undefined) { e.y2 = c.y2; e.origY2 = c.y2; }
        return e;
      });
    }

    function logoPathToD() {
      return logoPathData.map(c => {
        switch (c.type) {
          case 'M': return `M${c.x.toFixed(1)} ${c.y.toFixed(1)}`;
          case 'L': return `L${c.x.toFixed(1)} ${c.y.toFixed(1)}`;
          case 'Q': return `Q${c.x1.toFixed(1)} ${c.y1.toFixed(1)} ${c.x.toFixed(1)} ${c.y.toFixed(1)}`;
          case 'C': return `C${c.x1.toFixed(1)} ${c.y1.toFixed(1)} ${c.x2.toFixed(1)} ${c.y2.toFixed(1)} ${c.x.toFixed(1)} ${c.y.toFixed(1)}`;
          case 'Z': return 'Z';
          default: return '';
        }
      }).join('');
    }

    function renderLogoSvg() {
      if (!logoPathData) return;
      const svg = document.getElementById('logoSvg');
      const isDark = document.body.classList.contains('dark');
      const fillColor = isDark ? '#f0f0eb' : '#1a1a1a';
      const handleColor = isDark ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.2)';
      const nodeStroke = isDark ? 'rgba(255,255,255,0.6)' : 'rgba(0,0,0,0.45)';
      const nodeFill = isDark ? '#1a1a1a' : '#ffffff';
      const handleDotFill = isDark ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.3)';
      const d = logoPathToD();

      let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
      for (const c of logoPathData) {
        for (const k of ['x','y','x1','y1','x2','y2']) {
          if (c[k]===undefined) continue;
          if (k.startsWith('x')) { minX=Math.min(minX,c[k]); maxX=Math.max(maxX,c[k]); }
          else { minY=Math.min(minY,c[k]); maxY=Math.max(maxY,c[k]); }
        }
      }
      const pad=8;
      const vbW=(maxX-minX)+pad*2, vbH=(maxY-minY)+pad*2;
      const scale=(LOGO_FONT_SIZE+12)/vbH;
      svg.setAttribute('width', Math.ceil(vbW*scale));
      svg.setAttribute('height', Math.ceil(vbH*scale));
      svg.setAttribute('viewBox', `${minX-pad} ${minY-pad} ${vbW} ${vbH}`);

      const op = logoShowNodes;
      let html = `<path d="${d}" fill="${fillColor}"/>`;

      if (op > 0.01) {
        html += `<path d="${d}" fill="none" stroke="${fillColor}" stroke-width="0.5" opacity="${op*0.25}"/>`;
        let px=0, py=0;
        const ns=1.6, hr=1.0;
        for (let i=0; i<logoPathData.length; i++) {
          const c = logoPathData[i];
          if (c.type==='Q') {
            html += `<line x1="${px}" y1="${py}" x2="${c.x1}" y2="${c.y1}" stroke="${handleColor}" stroke-width="0.5" opacity="${op}"/>`;
            html += `<line x1="${c.x1}" y1="${c.y1}" x2="${c.x}" y2="${c.y}" stroke="${handleColor}" stroke-width="0.5" opacity="${op}"/>`;
            html += `<circle cx="${c.x1}" cy="${c.y1}" r="${hr}" fill="${handleDotFill}" opacity="${op}" data-seg="${i}" data-prop="x1y1" class="logo-handle" style="cursor:grab"/>`;
          }
          if (c.type==='C') {
            html += `<line x1="${px}" y1="${py}" x2="${c.x1}" y2="${c.y1}" stroke="${handleColor}" stroke-width="0.5" opacity="${op}"/>`;
            html += `<circle cx="${c.x1}" cy="${c.y1}" r="${hr}" fill="${handleDotFill}" opacity="${op}" data-seg="${i}" data-prop="x1y1" class="logo-handle" style="cursor:grab"/>`;
            html += `<line x1="${c.x}" y1="${c.y}" x2="${c.x2}" y2="${c.y2}" stroke="${handleColor}" stroke-width="0.5" opacity="${op}"/>`;
            html += `<circle cx="${c.x2}" cy="${c.y2}" r="${hr}" fill="${handleDotFill}" opacity="${op}" data-seg="${i}" data-prop="x2y2" class="logo-handle" style="cursor:grab"/>`;
          }
          if (c.x!==undefined && c.type!=='Z') {
            html += `<rect x="${c.x-ns}" y="${c.y-ns}" width="${ns*2}" height="${ns*2}" fill="${nodeFill}" stroke="${nodeStroke}" stroke-width="0.5" opacity="${op}" data-seg="${i}" data-prop="xy" class="logo-anchor" style="cursor:grab"/>`;
          }
          if (c.x!==undefined) { px=c.x; py=c.y; }
        }
      }
      svg.innerHTML = html;
    }

    function animateLogoNodes(show) {
      if (logoAnimFrame) cancelAnimationFrame(logoAnimFrame);
      const target = show ? 1 : 0;
      function tick() {
        const diff = target - logoShowNodes;
        if (Math.abs(diff) < 0.02) { logoShowNodes=target; renderLogoSvg(); logoAnimFrame=null; return; }
        logoShowNodes += diff * 0.15;
        renderLogoSvg();
        logoAnimFrame = requestAnimationFrame(tick);
      }
      tick();
    }

    function logoSvgCoords(e) {
      const svg = document.getElementById('logoSvg');
      const pt = svg.createSVGPoint();
      pt.x = e.clientX; pt.y = e.clientY;
      return pt.matrixTransform(svg.getScreenCTM().inverse());
    }

    function onLogoPointerDown(e) {
      if (!logoSvgReady || !logoPathData) return;
      const el = e.target;
      if (!el.dataset || !el.dataset.seg) return;
      e.preventDefault(); e.stopPropagation();
      const segIdx = parseInt(el.dataset.seg);
      const prop = el.dataset.prop;
      const coords = logoSvgCoords(e);
      const c = logoPathData[segIdx];
      logoDragging = { segIdx, prop, startX: coords.x, startY: coords.y };
      if (prop==='xy') { logoDragging.origX=c.x; logoDragging.origY=c.y; }
      else if (prop==='x1y1') { logoDragging.origX=c.x1; logoDragging.origY=c.y1; }
      else if (prop==='x2y2') { logoDragging.origX=c.x2; logoDragging.origY=c.y2; }
      document.addEventListener('pointermove', onLogoPointerMove);
      document.addEventListener('pointerup', onLogoPointerUp);
    }

    function onLogoPointerMove(e) {
      if (!logoDragging) return;
      const coords = logoSvgCoords(e);
      const dx = coords.x - logoDragging.startX;
      const dy = coords.y - logoDragging.startY;
      const c = logoPathData[logoDragging.segIdx];
      if (logoDragging.prop==='xy') { c.x=logoDragging.origX+dx; c.y=logoDragging.origY+dy; }
      else if (logoDragging.prop==='x1y1') { c.x1=logoDragging.origX+dx; c.y1=logoDragging.origY+dy; }
      else if (logoDragging.prop==='x2y2') { c.x2=logoDragging.origX+dx; c.y2=logoDragging.origY+dy; }
      renderLogoSvg();
    }

    function onLogoPointerUp() {
      logoDragging = null;
      document.removeEventListener('pointermove', onLogoPointerMove);
      document.removeEventListener('pointerup', onLogoPointerUp);
    }

    function springBackLogo() {
      if (!logoPathData) return;
      let maxD = 0;
      for (const c of logoPathData) {
        for (const k of ['x','y','x1','y1','x2','y2']) {
          const ok = 'orig' + k.charAt(0).toUpperCase() + k.slice(1);
          if (c[ok]===undefined) continue;
          const diff = c[ok] - c[k];
          c[k] += diff * 0.12;
          maxD = Math.max(maxD, Math.abs(diff));
        }
      }
      renderLogoSvg();
      if (maxD > 0.1) { logoSpringFrame = requestAnimationFrame(springBackLogo); }
      else {
        for (const c of logoPathData) {
          for (const k of ['x','y','x1','y1','x2','y2']) {
            const ok = 'orig' + k.charAt(0).toUpperCase() + k.slice(1);
            if (c[ok]!==undefined) c[k] = c[ok];
          }
        }
        renderLogoSvg();
        logoSpringFrame = null;
      }
    }

    const logoEl = document.querySelector('.logo');
    const logoSvg = document.getElementById('logoSvg');

    logoEl.addEventListener('mouseenter', () => {
      logoHoverActive = true;
      if (logoSpringFrame) { cancelAnimationFrame(logoSpringFrame); logoSpringFrame=null; }
      animateLogoNodes(true);
    });
    logoEl.addEventListener('mouseleave', () => {
      logoHoverActive = false;
      logoDragging = null;
      document.removeEventListener('pointermove', onLogoPointerMove);
      document.removeEventListener('pointerup', onLogoPointerUp);
      animateLogoNodes(false);
      if (logoPathData) logoSpringFrame = requestAnimationFrame(springBackLogo);
    });
    logoSvg.addEventListener('pointerdown', onLogoPointerDown);

    const origSetTheme = setTheme;
    setTheme = function(theme) { origSetTheme(theme); if (logoSvgReady) renderLogoSvg(); };

    // ---- Init ----
    loadFonts();
    initLogo();
  </script>
</body>
</html>
