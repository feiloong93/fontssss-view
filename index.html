    });

    // ---- Logo: SVG bezier node editor effect ----
    const LOGO_TEXT = 'Fontssss view';
    const LOGO_FONT_SIZE = 48;
    let logoPathData = null;
    let logoSvgReady = false;
    let logoDragging = null;
    let logoAnimFrame = null;
    let logoShowNodes = 0;
    let logoSpringFrame = null;
    let logoFixedVB = null; // fixed viewBox, computed once
    let logoMouseSvg = null; // mouse position in SVG coords
    let logoSelectedSeg = null; // currently dragged segment index
    const LOGO_FONT_URL = 'https://cdn.jsdelivr.net/fontsource/fonts/inter@latest/latin-700-normal.ttf';
    const LOGO_NODE_RADIUS = 60; // proximity radius in SVG units to show nodes

    async function initLogo() {
      try {
        const resp = await fetch(LOGO_FONT_URL);
        const buf = await resp.arrayBuffer();
        const font = opentype.parse(buf);
        // Build path with tighter letter-spacing (-0.04em)
        const kerningFactor = -0.04;
        const baseline = LOGO_FONT_SIZE * 0.78;
        let xPos = 0;
        const allCmds = [];
        for (let ci = 0; ci < LOGO_TEXT.length; ci++) {
          const ch = LOGO_TEXT[ci];
          const glyph = font.charToGlyph(ch);
          const glyphPath = glyph.getPath(xPos, baseline, LOGO_FONT_SIZE);
          allCmds.push(...glyphPath.commands);
          const advance = (glyph.advanceWidth / font.unitsPerEm) * LOGO_FONT_SIZE;
          xPos += advance + kerningFactor * LOGO_FONT_SIZE;
        }
        buildLogoPathData(allCmds);
        // Compute fixed viewBox from original path
        let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
        for (const c of logoPathData) {
          for (const k of ['x','y','x1','y1','x2','y2']) {
            if (c[k]===undefined) continue;
            if (k.startsWith('x')) { minX=Math.min(minX,c[k]); maxX=Math.max(maxX,c[k]); }
            else { minY=Math.min(minY,c[k]); maxY=Math.max(maxY,c[k]); }
          }
        }
        const pad=6;
        logoFixedVB = { x: minX-pad, y: minY-pad, w: (maxX-minX)+pad*2, h: (maxY-minY)+pad*2 };
        renderLogoSvg();
        logoSvgReady = true;
      } catch (e) {
        console.warn('Logo init error:', e);
        const svg = document.getElementById('logoSvg');
        svg.innerHTML = `<text x="0" y="38" font-size="48" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" fill="currentColor">${LOGO_TEXT}</text>`;
        const bbox = svg.getBBox();
        svg.setAttribute('width', Math.ceil(bbox.width+4));
        svg.setAttribute('height', Math.ceil(bbox.height+4));
        svg.setAttribute('viewBox', `${bbox.x-2} ${bbox.y-2} ${bbox.width+4} ${bbox.height+4}`);
      }
    }

    function buildLogoPathData(cmds) {
      logoPathData = cmds.map(c => {
        const e = { type: c.type };
        if (c.x !== undefined) { e.x = c.x; e.origX = c.x; }
        if (c.y !== undefined) { e.y = c.y; e.origY = c.y; }
        if (c.x1 !== undefined) { e.x1 = c.x1; e.origX1 = c.x1; }
        if (c.y1 !== undefined) { e.y1 = c.y1; e.origY1 = c.y1; }
        if (c.x2 !== undefined) { e.x2 = c.x2; e.origX2 = c.x2; }
        if (c.y2 !== undefined) { e.y2 = c.y2; e.origY2 = c.y2; }
        return e;
      });
    }

    function logoPathToD() {
      return logoPathData.map(c => {
        switch (c.type) {
          case 'M': return `M${c.x.toFixed(2)} ${c.y.toFixed(2)}`;
          case 'L': return `L${c.x.toFixed(2)} ${c.y.toFixed(2)}`;
          case 'Q': return `Q${c.x1.toFixed(2)} ${c.y1.toFixed(2)} ${c.x.toFixed(2)} ${c.y.toFixed(2)}`;
          case 'C': return `C${c.x1.toFixed(2)} ${c.y1.toFixed(2)} ${c.x2.toFixed(2)} ${c.y2.toFixed(2)} ${c.x.toFixed(2)} ${c.y.toFixed(2)}`;
          case 'Z': return 'Z';
          default: return '';
        }
      }).join('');
    }

    function distToMouse(px, py) {
      if (!logoMouseSvg) return Infinity;
      const dx = px - logoMouseSvg.x, dy = py - logoMouseSvg.y;
      return Math.sqrt(dx*dx + dy*dy);
    }

    function renderLogoSvg() {
      if (!logoPathData || !logoFixedVB) return;
      const svg = document.getElementById('logoSvg');
      const isDark = document.body.classList.contains('dark');
      const fillColor = isDark ? '#f0f0eb' : '#1a1a1a';
      const accentBlue = '#2D7FF9';
      const handleLineColor = 'rgba(45,127,249,0.5)';
      const d = logoPathToD();

      // Fixed viewBox — never changes
      const vb = logoFixedVB;
      const targetH = LOGO_FONT_SIZE + 12;
      const scale = targetH / vb.h;
      svg.setAttribute('width', Math.ceil(vb.w * scale));
      svg.setAttribute('height', Math.ceil(vb.h * scale));
      svg.setAttribute('viewBox', `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);

      const op = logoShowNodes;
      let html = `<path d="${d}" fill="${fillColor}"/>`;

      if (op > 0.01) {
        let px=0, py=0;
        const anchorR = 1.2;
        const handleR = 0.8;

        for (let i=0; i<logoPathData.length; i++) {
          const c = logoPathData[i];
          const isSelected = (logoSelectedSeg === i);

          // Compute min distance of this segment's points to mouse
          let minDist = Infinity;
          if (c.x !== undefined) minDist = Math.min(minDist, distToMouse(c.x, c.y));
          if (c.x1 !== undefined) minDist = Math.min(minDist, distToMouse(c.x1, c.y1));
          if (c.x2 !== undefined) minDist = Math.min(minDist, distToMouse(c.x2, c.y2));
          if (logoDragging && logoDragging.segIdx === i) minDist = 0;

          // Distance-based alpha: full at center, fades to 0 at LOGO_NODE_RADIUS
          let segOp = 0;
          if (minDist < LOGO_NODE_RADIUS) {
            const t = 1 - (minDist / LOGO_NODE_RADIUS);
            segOp = op * t * t; // quadratic ease for smooth falloff
          }

          if (segOp > 0.01) {
            if (c.type==='Q') {
              html += `<line x1="${px}" y1="${py}" x2="${c.x1}" y2="${c.y1}" stroke="${handleLineColor}" stroke-width="0.3" opacity="${(segOp*0.7).toFixed(2)}"/>`;
              html += `<line x1="${c.x1}" y1="${c.y1}" x2="${c.x}" y2="${c.y}" stroke="${handleLineColor}" stroke-width="0.3" opacity="${(segOp*0.7).toFixed(2)}"/>`;
              html += `<circle cx="${c.x1}" cy="${c.y1}" r="${handleR}" fill="${accentBlue}" opacity="${segOp.toFixed(2)}" data-seg="${i}" data-prop="x1y1" style="cursor:grab"/>`;
            }
            if (c.type==='C') {
              html += `<line x1="${px}" y1="${py}" x2="${c.x1}" y2="${c.y1}" stroke="${handleLineColor}" stroke-width="0.3" opacity="${(segOp*0.7).toFixed(2)}"/>`;
              html += `<circle cx="${c.x1}" cy="${c.y1}" r="${handleR}" fill="${accentBlue}" opacity="${segOp.toFixed(2)}" data-seg="${i}" data-prop="x1y1" style="cursor:grab"/>`;
              html += `<line x1="${c.x}" y1="${c.y}" x2="${c.x2}" y2="${c.y2}" stroke="${handleLineColor}" stroke-width="0.3" opacity="${(segOp*0.7).toFixed(2)}"/>`;
              html += `<circle cx="${c.x2}" cy="${c.y2}" r="${handleR}" fill="${accentBlue}" opacity="${segOp.toFixed(2)}" data-seg="${i}" data-prop="x2y2" style="cursor:grab"/>`;
            }
            // Anchor point — small blue circle with thin white stroke
            if (c.x!==undefined && c.type!=='Z') {
              html += `<circle cx="${c.x}" cy="${c.y}" r="${anchorR}" fill="${accentBlue}" stroke="#fff" stroke-width="0.25" opacity="${segOp.toFixed(2)}" data-seg="${i}" data-prop="xy" style="cursor:grab"/>`;
            }
            // Coordinate label on dragged node
            if (isSelected && logoDragging) {
              const lx = c.x !== undefined ? c.x : (c.x1 || 0);
              const ly = c.y !== undefined ? c.y : (c.y1 || 0);
              html += `<text x="${lx + 3}" y="${ly + 7}" font-size="4" font-family="-apple-system,sans-serif" fill="${accentBlue}" opacity="${segOp.toFixed(2)}">X: ${Math.round(lx)}</text>`;
              html += `<text x="${lx + 3}" y="${ly + 12}" font-size="4" font-family="-apple-system,sans-serif" fill="${accentBlue}" opacity="${segOp.toFixed(2)}">Y: ${Math.round(ly)}</text>`;
            }
          }

          if (c.x!==undefined) { px=c.x; py=c.y; }
        }
      }
      svg.innerHTML = html;
    }

    function animateLogoNodes(show) {
      if (logoAnimFrame) cancelAnimationFrame(logoAnimFrame);
      const target = show ? 1 : 0;
      function tick() {
        const diff = target - logoShowNodes;
        if (Math.abs(diff) < 0.02) { logoShowNodes=target; renderLogoSvg(); logoAnimFrame=null; return; }
        logoShowNodes += diff * 0.18;
        renderLogoSvg();
        logoAnimFrame = requestAnimationFrame(tick);
      }
      tick();
    }

    function logoSvgCoords(e) {
      const svg = document.getElementById('logoSvg');
      const pt = svg.createSVGPoint();
      pt.x = e.clientX; pt.y = e.clientY;
      return pt.matrixTransform(svg.getScreenCTM().inverse());
    }

    function onLogoPointerDown(e) {
      if (!logoSvgReady || !logoPathData) return;
      const el = e.target;
      if (!el.dataset || !el.dataset.seg) return;
      e.preventDefault(); e.stopPropagation();
      const segIdx = parseInt(el.dataset.seg);
      const prop = el.dataset.prop;
      const coords = logoSvgCoords(e);
      const c = logoPathData[segIdx];
      logoSelectedSeg = segIdx;
      logoDragging = { segIdx, prop, startX: coords.x, startY: coords.y };
      if (prop==='xy') { logoDragging.origX=c.x; logoDragging.origY=c.y; }
      else if (prop==='x1y1') { logoDragging.origX=c.x1; logoDragging.origY=c.y1; }
      else if (prop==='x2y2') { logoDragging.origX=c.x2; logoDragging.origY=c.y2; }
      document.addEventListener('pointermove', onLogoPointerMove);
      document.addEventListener('pointerup', onLogoPointerUp);
    }

    function onLogoPointerMove(e) {
      if (!logoDragging) return;
      const coords = logoSvgCoords(e);
      const dx = coords.x - logoDragging.startX;
      const dy = coords.y - logoDragging.startY;
      const c = logoPathData[logoDragging.segIdx];
      if (logoDragging.prop==='xy') { c.x=logoDragging.origX+dx; c.y=logoDragging.origY+dy; }
      else if (logoDragging.prop==='x1y1') { c.x1=logoDragging.origX+dx; c.y1=logoDragging.origY+dy; }
      else if (logoDragging.prop==='x2y2') { c.x2=logoDragging.origX+dx; c.y2=logoDragging.origY+dy; }
      renderLogoSvg();
    }

    function onLogoPointerUp() {
      logoDragging = null;
      logoSelectedSeg = null;
      document.removeEventListener('pointermove', onLogoPointerMove);
      document.removeEventListener('pointerup', onLogoPointerUp);
      renderLogoSvg();
    }

    function springBackLogo() {
      if (!logoPathData) return;
      let maxD = 0;
      for (const c of logoPathData) {
        for (const k of ['x','y','x1','y1','x2','y2']) {
          const ok = 'orig' + k.charAt(0).toUpperCase() + k.slice(1);
          if (c[ok]===undefined) continue;
          const diff = c[ok] - c[k];
          c[k] += diff * 0.12;
          maxD = Math.max(maxD, Math.abs(diff));
        }
      }
      renderLogoSvg();
      if (maxD > 0.1) { logoSpringFrame = requestAnimationFrame(springBackLogo); }
      else {
        for (const c of logoPathData) {
          for (const k of ['x','y','x1','y1','x2','y2']) {
            const ok = 'orig' + k.charAt(0).toUpperCase() + k.slice(1);
            if (c[ok]!==undefined) c[k] = c[ok];
          }
        }
        renderLogoSvg();
        logoSpringFrame = null;
      }
    }

    const logoEl = document.querySelector('.logo');
    const logoSvg = document.getElementById('logoSvg');

    // Track mouse position for proximity-based node display
    logoEl.addEventListener('mousemove', (e) => {
      if (!logoSvgReady) return;
      logoMouseSvg = logoSvgCoords(e);
      if (logoShowNodes > 0.5) renderLogoSvg();
    });

    logoEl.addEventListener('mouseenter', () => {
      if (logoSpringFrame) { cancelAnimationFrame(logoSpringFrame); logoSpringFrame=null; }
      animateLogoNodes(true);
    });
    logoEl.addEventListener('mouseleave', () => {
      logoMouseSvg = null;
      logoDragging = null;
      logoSelectedSeg = null;
      document.removeEventListener('pointermove', onLogoPointerMove);
      document.removeEventListener('pointerup', onLogoPointerUp);
      animateLogoNodes(false);
      if (logoPathData) logoSpringFrame = requestAnimationFrame(springBackLogo);
    });
    logoSvg.addEventListener('pointerdown', onLogoPointerDown);

    // Header spacer click → return to main page when in glyph view
    document.getElementById('headerSpacer').addEventListener('click', () => {
      goHome();
    });

    const origSetTheme = setTheme;
    setTheme = function(theme) { origSetTheme(theme); if (logoSvgReady) renderLogoSvg(); };


    // ===== ICON VIEW =====
    const ICON_FONT_URL = 'icons.ttf';
    let iconOTFont = null;
    let iconGlyphs = [];
    let iconAxesData = [];
    let iconVariationSettings = {};
    let iconSearchQuery = '';
    let selectedIconGlyph = null;
    let iconFontFamily = 'HyperOSIcons';
    let iconFontBuffer = null;
    let iconCategory = 'all';
    let iconColor = '#000000';
    let iconBgColor = '';

    const ICON_CATEGORIES = {
      'all': '全部',
      'action': '操作',
      'media': '媒体',
      'communication': '通信',
      'file': '文件',
      'time': '时间',
      'navigation': '导航',
      'editing': '编辑',
      'social': '社交',
      'other': '其他'
    };

    const ICON_CAT_MAP = {
      'action': ['search','ok','close','close_2','back','add','add_circle','remove','delete','clear','refresh','reset','replace','redo','undo','sort','select_all','expand_more','expand_less','chevron_backward','chevron_forward','zoom_out','more','more_circle','menu','settings','tune','filter','rotate_left'],
      'media': ['play','pause','volume_up','volume_off','recording','call_recording','app_recording','recording_tape','music','short_video','mini_drama','movie','screen_capture','screen_mirroring','trim','photos','album','image','background','map_album'],
      'communication': ['phone','messages','email','send','forward','reply','reply_all','notifications','carrier','community','contacts','contacts_circle','contacts_book','remove_contact','blocklist'],
      'file': ['file','folder','folder_fill','add_folder','move_file','convert_file','copy','paste','cut','rename','save','download','upload_cloud','import','backup','file_downloads','top_downloads','merge'],
      'time': ['alarm','world_clock','recent','stopwatch','timer','years','months','weeks','th_1','th_2','th_3','th_4','th_5','th_6','th_7','th_8','th_9','th_10','th_11','th_12','th_13','th_14','th_15','th_16','th_17','th_18','th_19','th_20','th_21','th_22','th_23','th_24','th_25','th_26','th_27','th_28','th_29','th_30','th_31'],
      'navigation': ['location','all','list_view','grid_view','sidebar','horizontal_split','vertical_split','layers','mind_map'],
      'editing': ['edit','create','pin','unpin','link','scan','ai_scan','translate','read','mark_all_as_read','mark_as_read','mark_ras_unread','add_bookmark','starred','unstar','report','info','help','answer'],
      'social': ['favorites','favorites_fill','share','store','promotions','bank_cards','coupon','child','gift','rocket','book','theme','cloud_fill','notes','notes_fill','tasks','playlist'],
      'media_ctrl': ['mic','mic_slash','hide','show','lock','unlock','search_device','update']
    };

    function getIconCategory(name) {
      for (var cat in ICON_CAT_MAP) {
        if (ICON_CAT_MAP[cat].indexOf(name) !== -1) return cat;
      }
      return 'other';
    }

    function renderIconSidebar() {
      var counts = {};
      for (var cat in ICON_CATEGORIES) counts[cat] = 0;
      iconGlyphs.forEach(function(g) {
        var c = getIconCategory(g.name);
        if (counts[c] !== undefined) counts[c]++;
        counts['all']++;
      });
      var sb = document.getElementById('iconSidebar');
      var html = '';
      for (var cat in ICON_CATEGORIES) {
        if (cat !== 'all' && cat !== 'other' && (!counts[cat] || counts[cat] === 0)) continue;
        html += '<button class="icon-cat-item' + (iconCategory === cat ? ' active' : '') + '" data-cat="' + cat + '" onclick="setIconCategory(\'' + cat + '\')">' + ICON_CATEGORIES[cat] + ' <span style="margin-left:auto;font-size:11px;opacity:0.5">' + (counts[cat] || 0) + '</span></button>';
      }
      sb.innerHTML = html;
    }

    function setIconCategory(cat) {
      iconCategory = cat;
      document.querySelectorAll('.icon-cat-item').forEach(function(el) {
        el.classList.toggle('active', el.dataset.cat === cat);
      });
      renderIconGrid();
    }

    async function initIconView() {
      try {
        const resp = await fetch(ICON_FONT_URL);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const buf = await resp.arrayBuffer();
        iconFontBuffer = buf;
        loadIconFont(buf, 'HyperOS Symbols UI');
      } catch (err) {
        document.getElementById('iconEmpty').innerHTML = '<p style="color:var(--text-secondary)">图标字体加载失败</p>';
        console.error('Icon font load error:', err);
      }
    }

    function loadIconFont(buf, fileName) {
      try {
        const font = opentype.parse(buf);
        iconOTFont = font;
        const face = new FontFace(iconFontFamily, buf);
        face.load().then(f => {
          document.fonts.add(f);
          renderIconGrid();
        });

        iconGlyphs = [];
        for (let i = 0; i < font.glyphs.length; i++) {
          const g = font.glyphs.get(i);
          if (!g.unicode && !g.unicodes.length) continue;
          const cp = g.unicode || g.unicodes[0];
          iconGlyphs.push({ index: i, name: g.name || '', unicode: cp, glyph: g });
        }

        iconAxesData = [];
        iconVariationSettings = {};
        if (font.tables.fvar && font.tables.fvar.axes) {
          iconAxesData = font.tables.fvar.axes.map(a => ({
            tag: a.tag,
            name: a.name && a.name.en ? a.name.en : a.tag,
            min: a.minValue, max: a.maxValue, default: a.defaultValue
          }));
          iconAxesData.forEach(a => { iconVariationSettings[a.tag] = a.default; });
        }

        const displayName = (font.names.fontFamily && font.names.fontFamily.en) || fileName;
        document.getElementById('iconFontName').textContent = displayName;

        document.getElementById('navIconCount').textContent = iconGlyphs.length || '';
        document.getElementById('iconEmpty').style.display = 'none';
        renderIconAxes();
        renderIconSidebar();
        renderIconGrid();
      } catch (err) {
        showToast('解析字体失败: ' + err.message);
      }
    }

    function renderIconAxes() {
      const container = document.getElementById('iconAxes');
      if (!iconAxesData.length) { container.innerHTML = ''; return; }
      var html = '';
      iconAxesData.forEach(function(a) {
        html += '<div class="icon-axis-control">';
        html += '<span class="icon-axis-label">' + a.name + '</span>';
        html += '<input type="range" class="icon-axis-slider" min="' + a.min + '" max="' + a.max + '" value="' + a.default + '" step="' + ((a.max - a.min) > 10 ? 1 : 0.01) + '" data-tag="' + a.tag + '" oninput="updateIconAxis(this)" />';
        html += '<span class="icon-axis-value" id="iconAxisVal_' + a.tag + '">' + Math.round(a.default) + '</span>';
        html += '</div>';
      });
      // Add weight preset dropdown if wght axis exists
      var wghtAxis = iconAxesData.find(function(a) { return a.tag === 'wght'; });
      if (wghtAxis) {
        html += '<select class="icon-weight-select" id="iconWeightSelect" onchange="setIconWeight(this.value)">';
        var presets = [100,200,300,400,500,600,700,800,900];
        var names = ['Thin','ExtraLight','Light','Regular','Medium','SemiBold','Bold','ExtraBold','Black'];
        presets.forEach(function(w, i) {
          if (w >= wghtAxis.min && w <= wghtAxis.max) {
            html += '<option value="' + w + '"' + (w === Math.round(wghtAxis.default) ? ' selected' : '') + '>' + names[i] + ' ' + w + '</option>';
          }
        });
        html += '</select>';
      }
      // Icon color dropdown
      var fgColors = [
        {c:'#000000',n:'黑色'},{c:'#666666',n:'灰色'},{c:'#FF3B30',n:'红色'},
        {c:'#FF9500',n:'橙色'},{c:'#007AFF',n:'蓝色'},{c:'#34C759',n:'绿色'},
        {c:'#AF52DE',n:'紫色'},{c:'#FFFFFF',n:'白色'}
      ];
      var fgName = '黑色';
      fgColors.forEach(function(item) { if (item.c === iconColor) fgName = item.n; });
      var isCustomFg = !fgColors.some(function(item) { return item.c === iconColor; });
      if (isCustomFg) fgName = '自定义';

      html += '<div class="icon-color-dropdown" id="iconFgDropdown">';
      html += '<button class="icon-color-btn" onclick="toggleIconColorMenu(\'iconFgMenu\')">';
      html += '<span class="icon-color-dot" style="background:' + iconColor + '"></span>';
      html += '颜色 · ' + fgName;
      html += '<svg viewBox="0 0 24 24" width="10" height="10" style="stroke:currentColor;fill:none;stroke-width:2"><polyline points="6 9 12 15 18 9"/></svg>';
      html += '</button>';
      html += '<div class="icon-color-menu" id="iconFgMenu">';
      fgColors.forEach(function(item) {
        html += '<button class="icon-color-option' + (iconColor === item.c ? ' active' : '') + '" onclick="setIconColor(\'' + item.c + '\')">';
        html += '<span class="cdot" style="background:' + item.c + '"></span>' + item.n + '</button>';
      });
      html += '<div class="icon-color-custom-row"><span class="cdot" style="background:conic-gradient(red,yellow,lime,aqua,blue,magenta,red)"></span>自定义<input type="color" value="' + iconColor + '" onchange="setIconColor(this.value)" /></div>';
      html += '</div></div>';

      // Background color dropdown
      var bgColors = [
        {c:'',n:'默认'},{c:'#FFFFFF',n:'白色'},{c:'#F5F5F0',n:'浅灰'},
        {c:'#1a1a1a',n:'深色'},{c:'#000000',n:'黑色'},
        {c:'#E8F5E9',n:'淡绿'},{c:'#E3F2FD',n:'淡蓝'},{c:'#FFF3E0',n:'淡橙'}
      ];
      var bgName = '默认';
      bgColors.forEach(function(item) { if (item.c === iconBgColor) bgName = item.n; });
      var isCustomBg = iconBgColor && !bgColors.some(function(item) { return item.c === iconBgColor; });
      if (isCustomBg) bgName = '自定义';

      html += '<div class="icon-color-dropdown" id="iconBgDropdown">';
      html += '<button class="icon-color-btn" onclick="toggleIconColorMenu(\'iconBgMenu\')">';
      html += '<span class="icon-color-dot" style="background:' + (iconBgColor || 'transparent') + '"></span>';
      html += '背景 · ' + bgName;
      html += '<svg viewBox="0 0 24 24" width="10" height="10" style="stroke:currentColor;fill:none;stroke-width:2"><polyline points="6 9 12 15 18 9"/></svg>';
      html += '</button>';
      html += '<div class="icon-color-menu" id="iconBgMenu">';
      bgColors.forEach(function(item) {
        var dotBg = item.c || 'transparent';
        html += '<button class="icon-color-option' + (iconBgColor === item.c ? ' active' : '') + '" onclick="setIconBgColor(\'' + item.c + '\')">';
        html += '<span class="cdot" style="background:' + dotBg + '"></span>' + item.n + '</button>';
      });
      html += '<div class="icon-color-custom-row"><span class="cdot" style="background:conic-gradient(red,yellow,lime,aqua,blue,magenta,red)"></span>自定义<input type="color" value="' + (iconBgColor || '#ffffff') + '" onchange="setIconBgColor(this.value)" /></div>';
      html += '</div></div>';

      container.innerHTML = html;
    }

    function toggleIconColorMenu(id) {
      var menu = document.getElementById(id);
      var wasOpen = menu.classList.contains('open');
      document.querySelectorAll('.icon-color-menu').forEach(function(m) { m.classList.remove('open'); });
      if (!wasOpen) menu.classList.add('open');
    }

    document.addEventListener('click', function(e) {
      if (!e.target.closest('.icon-color-dropdown')) {
        document.querySelectorAll('.icon-color-menu').forEach(function(m) { m.classList.remove('open'); });
      }
    }, true);

    function setIconColor(c) {
      iconColor = c;
      document.querySelectorAll('.icon-glyph').forEach(function(el) { el.style.color = c; });
      document.querySelectorAll('.icon-color-menu').forEach(function(m) { m.classList.remove('open'); });
      renderIconAxes();
    }

    function setIconBgColor(c) {
      iconBgColor = c;
      document.querySelectorAll('.icon-cell').forEach(function(el) { el.style.backgroundColor = c || ''; });
      document.querySelectorAll('.icon-color-menu').forEach(function(m) { m.classList.remove('open'); });
      renderIconAxes();
    }

    function setIconWeight(val) {
      val = parseFloat(val);
      iconVariationSettings['wght'] = val;
      var slider = document.querySelector('.icon-axis-slider[data-tag="wght"]');
      if (slider) slider.value = val;
      var label = document.getElementById('iconAxisVal_wght');
      if (label) label.textContent = Math.round(val);
      applyIconVariation();
    }

    function updateIconAxis(slider) {
      const tag = slider.dataset.tag;
      const val = parseFloat(slider.value);
      iconVariationSettings[tag] = val;
      document.getElementById('iconAxisVal_' + tag).textContent = Math.round(val);
      if (tag === 'wght') {
        var sel = document.getElementById('iconWeightSelect');
        if (sel) sel.value = Math.round(val);
      }
      applyIconVariation();
    }

    function getIconVariationCSS() {
      if (!iconAxesData.length) return '';
      return Object.entries(iconVariationSettings).map(function(e) { return "'" + e[0] + "' " + e[1]; }).join(', ');
    }

    function applyIconVariation() {
      const variation = getIconVariationCSS();
      document.querySelectorAll('.icon-glyph').forEach(el => { el.style.fontVariationSettings = variation; });
      const preview = document.getElementById('iconDetailPreview');
      if (preview) preview.style.fontVariationSettings = variation;
    }

    function renderIconGrid() {
      if (!iconGlyphs.length) return;
      const q = iconSearchQuery.toLowerCase();
      var filtered = iconGlyphs;
      if (iconCategory !== 'all') {
        filtered = filtered.filter(function(g) { return getIconCategory(g.name) === iconCategory; });
      }
      if (q) {
        filtered = filtered.filter(g => g.name.toLowerCase().includes(q) || ('U+' + g.unicode.toString(16).toUpperCase()).toLowerCase().includes(q));
      }
      const variation = getIconVariationCSS();
      const variationStyle = variation ? 'font-variation-settings:' + variation + ';' : '';
      const content = document.getElementById('iconContent');
      let html = '<div class="icon-grid">';
      for (const g of filtered) {
        const char = String.fromCodePoint(g.unicode);
        const hex = g.unicode.toString(16).toUpperCase().padStart(4, '0');
        html += '<div class="icon-cell" data-unicode="' + g.unicode + '" data-cp="' + g.unicode + '"' + (iconBgColor ? ' style="background:' + iconBgColor + '"' : '') + '>';
        html += '<span class="icon-glyph" style="font-family:\'' + iconFontFamily + '\';color:' + iconColor + ';' + variationStyle + '">' + char + '</span>';
        html += '<span class="icon-name">' + (g.name || 'U+' + hex) + '</span>';
        html += '</div>';
      }
      html += '</div>';
      content.innerHTML = html;

    }

    document.getElementById('iconSearch').addEventListener('input', (e) => {
      iconSearchQuery = e.target.value;
      renderIconGrid();
    });

    function selectIcon(unicode) {
      selectedIconGlyph = iconGlyphs.find(g => g.unicode === unicode);
      if (!selectedIconGlyph) return;
      document.querySelectorAll('.icon-cell').forEach(c => c.classList.remove('icon-selected'));
      const cell = document.querySelector('.icon-cell[data-unicode="' + unicode + '"]');
      if (cell) cell.classList.add('icon-selected');
    }

    function closeIconCtx() {
      document.getElementById('iconCtx').classList.remove('active');
    }

    // Right-click context menu on icon cells
    document.addEventListener('contextmenu', function(e) {
      const cell = e.target.closest('.icon-cell');
      const ctx = document.getElementById('iconCtx');
      if (!cell || !document.getElementById('iconView').classList.contains('active')) {
        ctx.classList.remove('active');
        return;
      }
      e.preventDefault();
      const unicode = parseInt(cell.dataset.unicode);
      selectIcon(unicode);
      ctx.style.left = Math.min(e.clientX, window.innerWidth - 180) + 'px';
      ctx.style.top = Math.min(e.clientY, window.innerHeight - 120) + 'px';
      ctx.classList.add('active');
    });

    document.addEventListener('click', function(e) {
      if (!e.target.closest('.icon-ctx')) closeIconCtx();
      // Left-click on icon cell: select it; click elsewhere: deselect
      if (document.getElementById('iconView').classList.contains('active')) {
        var cell = e.target.closest('.icon-cell');
        if (cell) {
          var unicode = parseInt(cell.dataset.unicode);
          selectIcon(unicode);
        } else if (!e.target.closest('.icon-ctx')) {
          document.querySelectorAll('.icon-cell.icon-selected').forEach(function(c) { c.classList.remove('icon-selected'); });
          selectedIconGlyph = null;
        }
      }
    });

    function copyIconName() {
      if (!selectedIconGlyph) return;
      navigator.clipboard.writeText(selectedIconGlyph.name || '').then(() => { showToast('已复制名称'); closeIconCtx(); });
    }

    function copyIconUnicode() {
      if (!selectedIconGlyph) return;
      const hex = selectedIconGlyph.unicode.toString(16).toUpperCase().padStart(4, '0');
      navigator.clipboard.writeText('U+' + hex).then(() => { showToast('已复制 Unicode'); closeIconCtx(); });
    }

    function copyIconSymbol() {
      if (!selectedIconGlyph) return;
      const char = String.fromCodePoint(selectedIconGlyph.unicode);
      navigator.clipboard.writeText(char).then(() => { showToast('\u5df2\u590d\u5236\u7b26\u53f7'); closeIconCtx(); });
    }

    function getIconSVGString(size) {
      if (!selectedIconGlyph || !iconOTFont) return null;
      var g = selectedIconGlyph.glyph;
      var upm = iconOTFont.unitsPerEm || 1000;
      var asc = iconOTFont.ascender || upm;
      var desc = iconOTFont.descender || 0;
      // Use raw glyph path at 1:1 scale (font units, Y-up coordinate system)
      var path = g.getPath(0, 0, upm);
      var pathData = path.toPathData(2);
      if (!pathData || pathData.length < 2) return null;
      // In opentype.js getPath(0,0,fontSize), y=0 is the baseline
      // ascender goes up (negative y in screen), descender goes down (positive y)
      // So the full em square in screen coords is from y=-ascender to y=-descender
      var advW = g.advanceWidth || upm;
      // Use the em square as viewBox for consistent sizing
      var vx = 0;
      var vy = -asc;
      var vw = Math.max(advW, upm);
      var vh = asc - desc;
      return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="' + vx + ' ' + vy + ' ' + vw + ' ' + vh + '" width="' + size + '" height="' + size + '"><path d="' + pathData + '" fill="currentColor"/></svg>';
    }

    function copyIconSVG() {
      var svg = getIconSVGString(1000);
      if (!svg) return;
      navigator.clipboard.writeText(svg).then(() => { showToast('\u5df2\u590d\u5236 SVG'); closeIconCtx(); });
    }

    function copyIconImage() {
      var svgStr = getIconSVGString(512);
      if (!svgStr) return;
      svgStr = svgStr.replace('currentColor', 'black');
      var img = new Image();
      img.onload = function() {
        var canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        var c = canvas.getContext('2d');
        c.drawImage(img, 0, 0, 512, 512);
        canvas.toBlob(function(blob) {
          navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]).then(() => { showToast('\u5df2\u590d\u5236 PNG'); closeIconCtx(); });
        }, 'image/png');
      };
      img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);
    }

    // ---- Init ----
    loadFonts();
    initIconView();
    initLogo();
  </script>
</body>
</html>
